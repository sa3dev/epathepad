services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: epatehpad
      POSTGRES_PASSWORD: epatehpad
      POSTGRES_DB: epatehpad
    ports:
      - "5434:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epatehpad"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Catches magic-link emails locally instead of the console.log fallback —
  # optional, only needed to test the SMTP transport path before prod.
  maildev:
    image: maildev/maildev
    restart: unless-stopped
    ports:
      - "1080:1080"
      - "1025:1025"

volumes:
  db_data:
